name: Build and Push Backend Image

# This workflow only runs when code is pushed to the 'main' branch 
# AND the changes are within the 'backend' folder.
on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase to avoid Docker naming errors
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # We use the built-in GITHUB_TOKEN to authenticate with GHCR.
    # No need for manual PATs for pushing to your own repository!
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Converts the IMAGE_NAME to lowercase because Docker image names
      # strictly prohibit uppercase letters.
      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >>${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically generates a 'latest' tag and a tag based on the git commit SHA
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
      # Builds the image using the context of the /backend folder
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Utilizes GitHub Actions Cache to massively speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max